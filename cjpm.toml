[package]
  cjc-version = "1.0.3"
  compile-option = "--experimental --enable-eh -Woff unused"
  description = ""
  name = "cangjie_experiments"
  output-type = "executable"
  src-dir = "src"
  target-dir = ""
  version = "1.0.0"
  [package.package_configuration]
  # Profiling: run ./scripts/profile.sh (see docs/profiling.md)
  [package.scripts]

[target.aarch64-apple-darwin.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}"]
[target.x86_64-unknown-linux-gnu.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}"]
[target.x86_64-w64-mingw32.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}"]

[profile.run.env]
  cjStackSize = { value = "1gb", splice-type = "replace" }
  # Large heap so GC threshold can be high
  cjHeapSize = { value = "4gb",  splice-type = "replace" }
  # GC only when heap is nearly full
  cjGCThreshold = { value = "4gb",  splice-type = "replace" }
  # Skip GC if last GC was less than 1 hour ago
  cjGCInterval = { value = "3600s", splice-type = "replace" }
  # Backup GC at most once per day
  cjBackupGCInterval = { value = "86400s", splice-type = "replace" }
  # Higher waterline after GC → next GC later
  cjHeapUtilization = { value = "0.3", splice-type = "replace" }
  cjHeapGrowth = { value = "0.5", splice-type = "replace" }